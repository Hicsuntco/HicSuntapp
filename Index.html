<script>
/* Strip environment-injected attribute names containing "::" that break
   DOM-to-SVG serialization (screenshot/PDF tooling). No effect on the app. */
(function () {
  function clean(el) {
    if (!el || !el.attributes) return;
    [...el.attributes].forEach(function (a) {
      if (a.name.indexOf('::') !== -1) el.removeAttribute(a.name);
    });
  }
  clean(document.documentElement);
  try {
    new MutationObserver(function () { clean(document.documentElement); })
      .observe(document.documentElement, { attributes: true });
  } catch (e) {}
})();
</script>
