<script>
/* Filet de sécurité pour la hauteur plein écran mobile : 100vh/100dvh peuvent
   être calculés un peu plus courts que la fenêtre visuelle réelle sur
   certaines versions iOS en PWA "Sur l'écran d'accueil", laissant une bande
   vide (fond natif de la WebView) sous la barre d'onglets. On mesure la
   vraie hauteur visible via JS et on la réapplique au resize/à la rotation
   plutôt que de se fier à une seule unité CSS. */
(function(){
  function setAppVH(){
    var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    document.documentElement.style.setProperty('--app-vh', (h * 0.01) + 'px');
  }
  setAppVH();
  window.addEventListener('resize', setAppVH);
  window.addEventListener('orientationchange', setAppVH);
  if(window.visualViewport) window.visualViewport.addEventListener('resize', setAppVH);
})();
</script>

<script>
/* Attrape-erreurs visible — pour diagnostiquer sur un appareil sans accès
   à la console (ex. iPhone sans Mac à proximité). Affiche le message et la
   ligne en clair en bas de l'écran au lieu de laisser un écran cassé muet. */
(function(){
  function showErr(msg){
    var d = document.getElementById('__hs_err');
    if(!d){
      d = document.createElement('div');
      d.id = '__hs_err';
      d.style.cssText = 'position:fixed;left:8px;right:8px;bottom:8px;z-index:999999;'
        + 'font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;'
        + 'padding:10px 14px;border-radius:10px;border:1px solid #5c2b2e;'
        + 'white-space:pre-wrap;max-height:40vh;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)';
      document.body.appendChild(d);
    }
    d.textContent = (d.textContent ? d.textContent + '\n\n' : '') + msg;
  }
  window.hsDebug = showErr; /* pour du diagnostic ponctuel visible à l'écran */
  window.addEventListener('error', function(e){
    showErr('[erreur] ' + (e.message || 'inconnue') + (e.filename ? '\n' + e.filename.split('/').pop() + ':' + e.lineno : ''));
  });
  window.addEventListener('unhandledrejection', function(e){
    var r = e.reason;
    showErr('[promesse rejetée] ' + (r && r.message ? r.message : String(r)));
  });
})();
</script>

<script>
/* ── DIAGNOSTIC TEMPORAIRE (bande blanche persistante en bas d'écran) ──
   À retirer une fois le bug identifié. Affiche les mesures réelles de
   l'appareil via le même canal que l'attrape-erreurs, pour comparer ce que
   le navigateur rapporte à ce qui est visible à l'écran. */
(function(){
  function reportViewport(){
    try{
      var vv = window.visualViewport;
      var phone = document.querySelector('.phone');
      var screenEl = document.querySelector('.screen');
      var probe = document.createElement('div');
      probe.style.cssText = 'position:fixed;bottom:0;left:0;height:0;padding-bottom:env(safe-area-inset-bottom,0px);visibility:hidden';
      document.body.appendChild(probe);
      var safeBottom = getComputedStyle(probe).paddingBottom;
      probe.remove();
      var pr = phone ? phone.getBoundingClientRect() : null;
      var sr = screenEl ? screenEl.getBoundingClientRect() : null;
      var lines = [
        '[diag viewport ' + new Date().toLocaleTimeString() + ']',
        'innerHeight=' + window.innerHeight + ' innerWidth=' + window.innerWidth,
        'vv.height=' + (vv ? vv.height : 'n/a') + ' vv.offsetTop=' + (vv ? vv.offsetTop : 'n/a') + ' vv.scale=' + (vv ? vv.scale : 'n/a'),
        'screen.height=' + screen.height + ' screen.availHeight=' + screen.availHeight,
        'devicePixelRatio=' + window.devicePixelRatio,
        'safe-area-inset-bottom=' + safeBottom,
        'standalone(display-mode)=' + window.matchMedia('(display-mode: standalone)').matches,
        'standalone(navigator)=' + (window.navigator.standalone === true),
        'phone.rect=' + (pr ? ('top=' + pr.top + ' bottom=' + pr.bottom + ' height=' + pr.height) : 'n/a'),
        'screen.rect=' + (sr ? ('top=' + sr.top + ' bottom=' + sr.bottom + ' height=' + sr.height) : 'n/a'),
        'docEl.clientHeight=' + document.documentElement.clientHeight,
        'body.scrollHeight=' + document.body.scrollHeight,
      ];
      if(typeof window.hsDebug === 'function') window.hsDebug(lines.join('\n'));
    }catch(e){ if(typeof window.hsDebug === 'function') window.hsDebug('[diag erreur] ' + (e && e.message || e)); }
  }
  setTimeout(reportViewport, 5200);
})();
</script>
