<script>
/* Détecte la coquille native Capacitor (iPhone ET iPad) pour forcer le
   layout plein écran de l'app — la bascule "mobile" normale ne se
   déclenche que sous 500px de large (voir core.css), donc jamais sur
   iPad où la fenêtre est bien plus large qu'un téléphone. */
/* location.protocol est connu immédiatement (dérivé de l'URL de la page
   elle-même), contrairement à window.Capacitor qui dépend du moment où
   le bridge natif l'injecte — plus fiable ici que d'attendre le bridge. */
if(location.protocol === 'capacitor:' || (window.Capacitor && typeof window.Capacitor.getPlatform === 'function' && window.Capacitor.getPlatform() !== 'web')){
  document.documentElement.classList.add('native-app');
}
</script>
<script>
/* Filet de sécurité pour la hauteur plein écran mobile : 100vh/100dvh peuvent
   être calculés un peu plus courts que la fenêtre visuelle réelle sur
   certaines versions iOS en PWA "Sur l'écran d'accueil", laissant une bande
   vide (fond natif de la WebView) sous la barre d'onglets. On mesure la
   vraie hauteur visible via JS et on la réapplique au resize/à la rotation
   plutôt que de se fier à une seule unité CSS. */
(function(){
  /* IMPORTANT : window.innerHeight uniquement, jamais visualViewport.height.
     visualViewport rétrécit quand le clavier apparaît (c'est son rôle), mais
     réagir à ça ici faisait suivre toute l'app (barre d'onglets comprise) au
     clavier au lieu de le laisser simplement se poser par-dessus — la barre
     se retrouvait à flotter au milieu de l'écran pendant la saisie. */
  function setAppVH(){
    document.documentElement.style.setProperty('--app-vh', (window.innerHeight * 0.01) + 'px');
  }
  setAppVH();
  window.addEventListener('resize', setAppVH);
  window.addEventListener('orientationchange', setAppVH);
})();
</script>

<script>
/* Attrape-erreurs visible — pour diagnostiquer sur un appareil sans accès
   à la console (ex. iPhone sans Mac à proximité). Affiche le message et la
   ligne en clair en bas de l'écran au lieu de laisser un écran cassé muet. */
(function(){
  function showErr(msg){
    var d = document.getElementById('__hs_err');
    var textEl;
    if(!d){
      d = document.createElement('div');
      d.id = '__hs_err';
      d.style.cssText = 'position:fixed;left:8px;right:8px;bottom:8px;z-index:999999;'
        + 'font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;'
        + 'padding:10px 34px 10px 14px;border-radius:10px;border:1px solid #5c2b2e;'
        + 'white-space:pre-wrap;max-height:40vh;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)';
      /* Bouton de fermeture : sans lui, un message resté affiché des heures
         (le voyageur navigue vers un autre écran sans jamais recharger la
         page) peut être confondu avec une erreur qui se produit "en ce
         moment", alors qu'il ne s'agit peut-être que d'un incident déjà
         passé et sans conséquence. */
      var closeBtn = document.createElement('button');
      closeBtn.textContent = '×';
      closeBtn.setAttribute('aria-label', 'Fermer');
      closeBtn.style.cssText = 'position:absolute;top:2px;right:6px;background:none;border:none;'
        + 'color:#ff8a80;font-size:20px;line-height:1;cursor:pointer;padding:8px';
      closeBtn.onclick = function(){ d.remove(); };
      d.appendChild(closeBtn);
      textEl = document.createElement('div');
      textEl.id = '__hs_err_text';
      d.appendChild(textEl);
      document.body.appendChild(d);
    }
    textEl = document.getElementById('__hs_err_text');
    textEl.textContent = (textEl.textContent ? textEl.textContent + '\n\n' : '') + msg;
  }
  window.hsDebug = showErr; /* pour du diagnostic ponctuel visible à l'écran */
  window.addEventListener('error', function(e){
    showErr('[erreur] ' + (e.message || 'inconnue') + (e.filename ? '\n' + e.filename.split('/').pop() + ':' + e.lineno : ''));
  });
  window.addEventListener('unhandledrejection', function(e){
    var r = e.reason;
    showErr('[promesse rejetée] ' + (r && r.message ? r.message : String(r)));
  });
})();
</script>
